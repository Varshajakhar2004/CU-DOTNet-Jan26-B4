<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb On/Off</title>
</head>
<body>
    <h2>BULB CONTROL</h2>
    <img id="bulb" src="off bulb.png" width="120">

<br><br>

<button onclick="document.getElementById('bulb').src='off bulb.png'">
Turn OFF
</button>

<button onclick="document.getElementById('bulb').src='on bulb.png'">
Turn ON
</button>
</body>
</html>
