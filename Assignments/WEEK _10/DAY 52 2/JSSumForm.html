<!DOCTYPE html>
<html>
<head>
<title>Sum of Two Numbers</title>
<script>
function checkN1(){
    let a = document.getElementById("n1");

    if(a.value == ""){
        a.style.backgroundColor = "red";
    }
    else if(isNaN(a.value)){
        a.style.backgroundColor = "yellow";
    }
    else{
        a.style.backgroundColor = "white";
    }
}

function checkN2(){
    let a = document.getElementById("n1");
    let b = document.getElementById("n2");
    let r = document.getElementById("result");

    if(b.value == ""){
        b.style.backgroundColor = "red";
        r.value = "ERROR";
    }
    else if(isNaN(b.value)){
        b.style.backgroundColor = "yellow";
        r.value = "ERROR";
    }
    else{
        b.style.backgroundColor = "white";

        if(!isNaN(a.value) && a.value != ""){
            r.value = Number(a.value) + Number(b.value);
        }
    }
}
</script>
</head>
<body>
<h3>Sum of 2 Numbers</h3>
<input type="text" id="n1" placeholder="n1" onblur="checkN1()">
+
<input type="text" id="n2" placeholder="n2" onblur="checkN2()">
=
<input type="text" id="result" placeholder="n1+n2" readonly>

</body>
</html>
